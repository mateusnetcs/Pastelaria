services:
  # ============================================
  # MySQL 8.0 - Banco de Dados
  # ============================================
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: pastelaria
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init-production.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ============================================
  # Flask Backend + Frontend
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: mysql
      DB_NAME: pastelaria
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 3306
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      WAHA_API_URL: ${WAHA_API_URL:-http://host.docker.internal:3001/api}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_SESSION: ${WAHA_SESSION:-padrão}
      WEBHOOK_PUBLIC_URL: ${WEBHOOK_PUBLIC_URL}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FLASK_DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      N8N_API_KEY: ${N8N_API_KEY:-}
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
